# Kratos-Rebirth 主题配置覆盖文件
# 此文件中的配置会覆盖主题默认配置

# 图片配置
image:
  favicon: "/images/favicon.png" # 站点图标
  avatar: "/images/avatar.png" # 个人信息挂件上的头像
  banner: # 站点横幅
    light: "" # 亮色模式
    dark: "" # 暗色模式
  background: # 站点背景
    light: "/images/background_light.png" # 亮色模式
    dark: "/images/background_dark.png" # 暗色模式
  about: # 介绍卡片
    light: "" # 亮色模式
    dark: "" # 暗色模式

# 导航栏配置
nav:
  auto_hide: true
  items:
    - label: 首页
      icon: home
      url: /
    - label: 归档
      icon: archive
      url: /archives/
    - label: 分类
      icon: folder
      url: /categories/
    - label: 标签
      icon: tags
      url: /tags/
    - label: 友链
      icon: link
      url: /friends/
    - label: 关于
      icon: user
      url: /about/
    - label: 联系
      icon: envelope
      url: /contact/

# Footer 页脚组件配置
footer:
  links: []
  # - icon: # 使用来自 fontawesome icons 4.7.0 图标库中的唯一标识；或者插入自定义的 HTML ，例如您可在此放置一串 svg 。
  #   link: # 按钮导向的目标链接
  #   addition: target="_blank" rel="nofollow" # 可选，用于指定链接的追加模式信息
  components: # 一些有特色的组件 （其他的请在 additional 自行追加）
    uptime:
      since: "2025/12/04 13:58:00"
      text: "本站已运行"
    author:
      homepage: "https://blog.rimuru.work" # 可以导向作者的首页
    additional:
      - - '本页访问人次:<span id="page_pv"></span>'
        - '本页访问人数:<span id="page_uv"></span>'
      - - '<a href="/about/">关于</a> | <a href="/contact/">联系</a> | <a href="/privacy/">隐私政策</a> | <a href="/terms/">服务条款</a>'

# 侧边栏与小挂件
sidebar:
  location: right # 侧边栏的位置
  widgets: # 小挂件的顺序
  - about # 关于
  - splitter # 分割线（这个不是个实际挂件，而是用来切分定位的）
  - toc # 目录
  - category # 分类列表
  - tagcloud # 标签聚合
  - posts # 最新文章

# 打赏组件设置
donate:
  enable: false # 是否启用打赏功能

# 版权提示
copyright_notice:
  append_copy: # 在复制时追加
    enable: false # 是否启用

# 额外的注入代码
additional_injections:
  head: |
    <!-- Preconnect hints for faster resource loading -->
    <link rel="preconnect" href="https://cdn.rimuru.work" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.rimuru.work">
    <link rel="preconnect" href="https://analytics.rimuru.work" crossorigin>
    <link rel="dns-prefetch" href="https://analytics.rimuru.work">
    <link rel="preconnect" href="https://www.googletagmanager.com" crossorigin>
    <link rel="dns-prefetch" href="https://www.googletagmanager.com">
    <link rel="preconnect" href="https://pagead2.googlesyndication.com" crossorigin>
    <link rel="dns-prefetch" href="https://pagead2.googlesyndication.com">
    <!-- Google AdSense Account Verification -->
    <meta name="google-adsense-account" content="ca-pub-9760626627924711">
    <!-- Google Consent Mode v2 - default denied -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('consent', 'default', {
        'ad_storage': 'denied',
        'ad_user_data': 'denied',
        'ad_personalization': 'denied',
        'analytics_storage': 'denied'
      });
    </script>
    <!-- Cookie Consent Banner CSS -->
    <style>
      #cookie-consent{position:fixed;bottom:0;left:0;right:0;background:var(--bg-color,#fff);color:var(--text-color,#333);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;box-shadow:0 -2px 12px rgba(0,0,0,.1);z-index:99999;font-size:14px;flex-wrap:wrap;transition:transform .3s ease}#cookie-consent.hidden{transform:translateY(100%);pointer-events:none}#cookie-consent p{margin:0;flex:1;min-width:200px;line-height:1.6}#cookie-consent a{color:var(--theme-color,#4a9eff);text-decoration:underline}#cookie-consent .btn-group{display:flex;gap:8px;flex-shrink:0}#cookie-consent button{padding:8px 20px;border:none;border-radius:4px;cursor:pointer;font-size:14px;transition:opacity .2s}#cookie-consent button:hover{opacity:.85}#cookie-consent .btn-accept{background:var(--theme-color,#4a9eff);color:#fff}#cookie-consent .btn-reject{background:transparent;color:var(--text-color,#666);border:1px solid var(--border-color,#ddd)}@media(max-width:600px){#cookie-consent{flex-direction:column;align-items:stretch;text-align:center}#cookie-consent .btn-group{justify-content:center}}
    </style>
  footer: ""
  after_footer: |
    <!-- 推荐阅读功能 -->
    <script defer src="/js/recommended-posts.js"></script>
    <!-- Self-hosted analytics -->
    <script defer src="https://cdn.rimuru.work/analytics_with_cloudflare/index.min.js" data-base-url="https://analytics.rimuru.work"></script>
    <!-- Google Analytics -->
    <script defer src="https://www.googletagmanager.com/gtag/js?id=G-PKP8Z0FC73"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-PKP8Z0FC73');
    </script>
    <!-- Google AdSense -->
    <script defer src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9760626627924711" crossorigin="anonymous"></script>
    <!-- PJAX analytics reload handler -->
    <script>
      window.addEventListener('pjax:complete', function() {
        const scriptUrl = 'https://cdn.rimuru.work/analytics_with_cloudflare/index.min.js';
        const oldScript = document.querySelector('script[src="' + scriptUrl + '"]');
        if (oldScript) oldScript.remove();
        const newScript = document.createElement('script');
        newScript.src = scriptUrl;
        newScript.defer = true;
        newScript.setAttribute('data-base-url', 'https://analytics.rimuru.work');
        document.body.appendChild(newScript);
      });
    </script>
    <!-- Cookie Consent Banner -->
    <div id="cookie-consent">
      <p>本站使用 Cookie 来改善用户体验、分析流量并展示个性化广告。继续浏览即表示你同意使用 Cookie。详情请阅读 <a href="/privacy/">隐私政策</a>。</p>
      <div class="btn-group">
        <button class="btn-accept" onclick="acceptCookies()">接受全部</button>
        <button class="btn-reject" onclick="rejectCookies()">仅必要</button>
      </div>
    </div>
    <script>
      (function(){
        var banner = document.getElementById('cookie-consent');
        var consent = localStorage.getItem('cookie_consent');
        function applyConsent(mode) {
          gtag('consent', 'update', {
            'ad_storage': mode,
            'ad_user_data': mode,
            'ad_personalization': mode,
            'analytics_storage': mode
          });
        }
        function hideBanner() {
          banner.classList.add('hidden');
          setTimeout(function(){ banner.remove(); }, 300);
        }
        if (consent === 'accepted') {
          hideBanner();
          applyConsent('granted');
        } else if (consent === 'rejected') {
          hideBanner();
        } else {
          applyConsent('denied');
        }
        window.acceptCookies = function() {
          localStorage.setItem('cookie_consent', 'accepted');
          applyConsent('granted');
          hideBanner();
        };
        window.rejectCookies = function() {
          localStorage.setItem('cookie_consent', 'rejected');
          hideBanner();
        };
      })();
    </script>
